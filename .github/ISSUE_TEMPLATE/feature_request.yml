name: Feature request
description: Propose a focused AgentTape feature.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer workflow problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Session storage
        - Git capture
        - Redaction
        - Reporting
        - Test parsing
        - Risk rules
        - Documentation
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this feature explicitly avoid?
