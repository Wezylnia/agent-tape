name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest command sequence that reproduces the issue.
      value: |
        ```bash
        dotnet run --project src/AgentTape.Cli/AgentTape.Cli.csproj -- record -- dotnet --version
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - .NET SDK:
        - Git version:
    validations:
      required: true
