name: Contributor task
description: Track a scoped task that is ready for contributors.
title: "[Task]: "
labels: ["contributor-ready", "status:available", "needs-triage"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What files and behavior should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] Tests added or updated
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - beginner
        - intermediate
        - advanced
    validations:
      required: true
